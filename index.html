<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>MMC | Gerador de Stylecard</title>
  <style>
    :root { --bg-dark: #09090b; --surface: #18181b; --border: #3f3f46; --text-main: #f4f4f5; --text-muted: #a1a1aa; --mmc-green: #7eff7e; --mmc-red: #ff4747; }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    
    #profileScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #141414; z-index: 9999; display: flex; flex-direction: column; justify-content: space-between; align-items: center; transition: opacity 0.6s ease; padding-top: 10vh; }
    .profiles-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
    .profile-title { font-size: 3vw; min-font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 2.5rem; letter-spacing: 2px; text-align: center; }
    .profiles-container { display: flex; gap: 3vw; justify-content: center; flex-wrap: wrap; }
    .profile { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.2s, opacity 0.4s; position: relative; }
    .profile:hover { transform: scale(1.05); }
    .profile-img-wrap { width: 10vw; height: 10vw; min-width: 110px; min-height: 110px; max-width: 160px; max-height: 160px; border-radius: 50%; overflow: hidden; border: 3px solid transparent; transition: border-color 0.2s; position: relative; background: #222; }
    .profile:hover .profile-img-wrap { border-color: #fff; }
    .profile img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s; }
    .profile-name-text { margin-top: 15px; font-size: 1.2vw; min-font-size: 14px; color: #808080; transition: color 0.2s; font-weight: 500; display: flex; align-items: center; gap: 5px; }
    .profile:hover .profile-name-text { color: #fff; }
    .lock-icon { width: 12px; height: 12px; fill: #808080; }
    .profile.loading .profile-img-wrap::after { content: ""; position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; margin-top: -20px; margin-left: -20px; border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid var(--mmc-green); border-radius: 50%; animation: spin 1s linear infinite; }
    .profiles-watermark { text-align: center; padding: 20px 0 40px 0; font-size: 11px; color: #333; font-weight: 500; letter-spacing: 0.5px; }

    #mainApp { display: none; opacity: 0; transition: opacity 0.8s ease; flex: 1; flex-direction: column; width: 100%; }
    .app-main { flex: 1; display: flex; flex-direction: column; padding: 40px; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
    .brand-group { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
    .brand { font-size: 22px; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; gap: 10px; margin-right: 10px; }
    .brand::before { content: ''; width: 12px; height: 12px; background: var(--mmc-green); border-radius: 50%; box-shadow: 0 0 10px var(--mmc-green); }
    .btn-header-pill { background: var(--surface); border: 1px solid var(--border); color: var(--text-main); border-radius: 20px; padding: 6px 14px; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; text-decoration: none; }
    .btn-header-pill:hover { border-color: var(--mmc-green); background: #27272a; }
    
    .btn-group { display: flex; gap: 10px; }
    .btn { padding: 12px 20px; font-size: 13px; font-weight: 600; cursor: pointer; text-transform: uppercase; border-radius: 6px; transition: 0.2s; border: 1px solid transparent; }
    .btn-primary { background: #fff; color: #000; }
    .btn-secondary { background: #27272a; color: #fff; border-color: var(--border); }
    .btn-success { background: rgba(126, 255, 126, 0.1); color: var(--mmc-green); border-color: rgba(126, 255, 126, 0.3); }
    
    .container { display: flex; gap: 30px; height: 60vh; }
    .box { flex: 1; display: flex; flex-direction: column; background: var(--surface); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
    textarea { flex: 1; background: var(--bg-dark); color: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 15px; font-family: 'Courier New', monospace; resize: none; line-height: 1.6; cursor: auto; }
    .action-bar { text-align: center; margin: 30px 0; gap: 15px; display: flex; justify-content: center; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 10000; align-items: center; justify-content: center; }
    .modal { position: relative; background: var(--surface); border: 1px solid var(--border); padding: 40px 30px 30px 30px; width: 500px; max-width: 95%; border-radius: 16px; max-height: 90vh; display: flex; flex-direction: column; align-items: center; overflow-y: auto;}
    .close-btn { position: absolute; top: 15px; right: 15px; background: transparent; border: none; cursor: pointer; }
    .modal input, .modal select { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; }
    
    .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; width: 100%; }
    .avatar-option { border: 2px solid transparent; border-radius: 50%; cursor: pointer; overflow: hidden; background: #222; }
    .avatar-option.selected { border-color: var(--mmc-green); }
    .avatar-option img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .preview-avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--border); margin-bottom: 15px; overflow: hidden;}
    .preview-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .store-grid { width: 100%; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; overflow-y: auto; margin-bottom: 20px; }
    .store-card { background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    .mini-tag { font-size: 8px; padding: 2px 6px; border-radius: 4px; color: #000; font-weight: 800; }
    .loader { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 16px; height: 16px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="profileScreen">
    <div class="profiles-main">
      <h1 class="profile-title">MMC - Stylecard System</h1>
      <div class="profiles-container" id="profilesContainerUI">
        
        <div class="profile" id="prof-P1" onclick="selectProfile('P1', this)">
          <div class="profile-img-wrap"><img id="img-P1" src=""></div>
          <span class="profile-name-text">
            <span id="name-P1">...</span> <svg class="lock-icon" id="lock-P1" style="display:none;" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
          </span>
        </div>

        <div class="profile" id="prof-P2" onclick="selectProfile('P2', this)">
          <div class="profile-img-wrap"><img id="img-P2" src=""></div>
          <span class="profile-name-text">
            <span id="name-P2">...</span> <svg class="lock-icon" id="lock-P2" style="display:none;" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
          </span>
        </div>

        <div class="profile" id="prof-P3" onclick="selectProfile('P3', this)">
          <div class="profile-img-wrap"><img id="img-P3" src=""></div>
          <span class="profile-name-text">
            <span id="name-P3">...</span> <svg class="lock-icon" id="lock-P3" style="display:none;" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
          </span>
        </div>

      </div>
    </div>
    <div class="profiles-watermark">MMC - Stylecard generator website. Created by Saori Suki, a Second Life user.</div>
  </div>

  <div id="mainApp">
    <div class="app-main">
      <div class="header">
        <div class="brand-group">
          <div class="brand" id="sysTitle">MMC | Gerador de Stylecard</div>
          <button class="btn-header-pill" onclick="abrirModal('modalChangeLang')">🌐 <span id="langBtnText">Language</span></button>
          <a href="https://shapemerge.allomancy.com/" target="_blank" class="btn-header-pill">🌀 Shape Merge</a>
          <button class="btn-header-pill" onclick="abrirModal('modalAdminAuth')">⚙️ Settings</button>
        </div>
        <div class="btn-group">
          <button class="btn btn-secondary" onclick="abrirModalLojas()" id="btnDbText">Lojas Registradas</button>
          <button class="btn btn-primary" onclick="abrirModalAdd()" id="btnAddText">+ Adicionar Loja</button>
        </div>
      </div>
      <div class="container">
        <div class="box"><label id="lblInputText">Entrada</label><textarea id="inputList"></textarea></div>
        <div class="box"><label id="lblOutputText">Resultado</label><textarea id="outputList"></textarea></div>
      </div>
      <div class="action-bar">
        <button class="btn btn-primary" id="genBtn" onclick="gerarNotecard()">Gerar Stylecard</button>
        <button class="btn btn-secondary" id="btnUpdateText" onclick="reorganizar()">Atualizar Ordem</button>
        <button class="btn btn-success" id="btnDownText" onclick="verificarDownload()">Baixar TXT</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modalAdminAuth">
    <div class="modal" style="width: 350px;">
      <h3 style="color: var(--mmc-red);">Área Admin</h3>
      <input type="password" id="adminPassInput" placeholder="Senha Mestre">
      <button class="btn btn-danger" style="width:100%" onclick="verificarSenhaAdmin()">Autenticar</button>
    </div>
  </div>

  <div class="modal-overlay" id="modalAdminSettings">
    <div class="modal" style="width: 450px;">
      <button class="close-btn" onclick="fecharModal('modalAdminSettings')">❌</button>
      <h3>Configurar Perfis</h3>
      <select id="configProfileSelect" onchange="carregarConfigPerfil()">
        <option value="P1">Slot 1</option>
        <option value="P2">Slot 2</option>
        <option value="P3">Slot 3</option>
      </select>
      <div class="preview-avatar"><img id="configAvatarPreview" src=""></div>
      <div class="avatar-grid" id="avatarGridList"></div>
      <label>Nome do Perfil:</label>
      <input type="text" id="configProfileName" placeholder="Ex: Saori Suki">
      <label>Senha de Acesso (vazio = livre):</label>
      <input type="password" id="configProfilePass" placeholder="Senha">
      <button class="btn btn-primary" id="btnSaveConfig" style="width:100%" onclick="salvarConfigPerfil()">Salvar</button>
    </div>
  </div>

  <div class="modal-overlay" id="modalProfileAuth">
    <div class="modal" style="width: 350px;">
      <h3 id="authTitle">Acesso Restrito</h3>
      <input type="password" id="profilePassInput" placeholder="Senha do Perfil">
      <button class="btn btn-primary" style="width:100%" onclick="verificarSenhaPerfil()">Entrar</button>
    </div>
  </div>

  <div class="modal-overlay" id="modalChangeLang">
    <div class="modal" style="width: 400px;">
      <h3>Idioma / Language</h3>
      <div style="display:flex; gap:10px; width:100%">
        <button class="btn btn-secondary" style="flex:1" onclick="setLanguage('pt')">Português</button>
        <button class="btn btn-secondary" style="flex:1" onclick="setLanguage('en')">English</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modalLojas">
    <div class="modal" style="width: 800px;">
      <button class="close-btn" onclick="fecharModal('modalLojas')">❌</button>
      <h3 id="titleDb">Lojas Registradas</h3>
      <input type="text" id="searchInput" placeholder="Buscar..." onkeyup="filtrarLojas()">
      <div class="store-grid" id="storeGrid"></div>
      <div style="display:flex; gap:10px"><button class="btn btn-danger" onclick="abrirModalPassword()">Apagar Tudo</button><button class="btn btn-secondary" onclick="downloadDatabase()">Backup</button></div>
    </div>
  </div>

  <div class="modal-overlay" id="modalAdd">
    <div class="modal">
      <button class="close-btn" onclick="fecharModal('modalAdd')">❌</button>
      <h3>Registrar Lojas</h3>
      <textarea id="fastInput" placeholder="LOJA = LINK = TAG"></textarea>
      <select id="tagSelect"></select>
      <button class="btn btn-primary" id="saveBtn" onclick="salvarLoja()">Salvar</button>
    </div>
  </div>

  <div class="modal-overlay" id="modalAlert"><div class="modal"><h3 style="color:#ff9800">Aviso</h3><p id="alertMsg"></p><button class="btn btn-secondary" onclick="fecharModal('modalAlert')">OK</button></div></div>
  <div class="modal-overlay" id="modalSuccess"><div class="modal"><h3 style="color:#7eff7e">Sucesso</h3><p id="successMsg"></p><button class="btn btn-success" onclick="fecharModal('modalSuccess')">OK</button></div></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxJ0DnrBEf0DYpTdVF5fJ2QXyjPxtvFpZGtCVTeNgAcRyF_p1BAmmC90R1_Np5WwP9WEA/exec"; 

    let profileConfigs = {};
    const availableAvatars = [
      "https://api.dicebear.com/7.x/lorelei/svg?seed=Saori&backgroundColor=ffb6c1",
      "https://api.dicebear.com/7.x/lorelei/svg?seed=GuestUser&backgroundColor=e2e8f0",
      "https://api.dicebear.com/7.x/adventurer/svg?seed=Gabriel&backgroundColor=add8e6",
      "https://api.dicebear.com/7.x/lorelei/svg?seed=Mimi&backgroundColor=b6e3f4",
      "https://api.dicebear.com/7.x/adventurer/svg?seed=Felix&backgroundColor=ffd5dc",
      "https://api.dicebear.com/7.x/bottts/svg?seed=Robot&backgroundColor=c0aede",
      "https://api.dicebear.com/7.x/avataaars/svg?seed=Suki&backgroundColor=ffdfbf",
      "https://api.dicebear.com/7.x/micah/svg?seed=Gamer&backgroundColor=d1d4f9"
    ];

    let currentSelectedAvatarUrl = "";
    let activeProfileID = null;
    let activeProfileElement = null;

    async function callApi(action, data = {}) {
      try {
        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, ...data }), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
        const result = await response.json();
        return result.status === 'success' ? result.data : null;
      } catch (e) { return null; }
    }

    window.onload = async () => { 
      setLanguage(currentLang); 
      let dbConfigs = await callApi('getProfilesConfig');
      if(dbConfigs) {
        profileConfigs = dbConfigs;
        ['P1', 'P2', 'P3'].forEach(id => {
           if(profileConfigs[id]) {
             document.getElementById('img-' + id).src = profileConfigs[id].avatar;
             document.getElementById('name-' + id).innerText = profileConfigs[id].name;
             document.getElementById('lock-' + id).style.display = profileConfigs[id].password ? "inline-block" : "none";
           }
        });
      }
    }

    function selectProfile(id, element) {
      activeProfileID = id;
      activeProfileElement = element;
      if(profileConfigs[id].password) {
        document.getElementById('profilePassInput').value = "";
        abrirModal('modalProfileAuth');
      } else { executarAnimacaoNetflix(); }
    }

    function verificarSenhaPerfil() {
      if (document.getElementById('profilePassInput').value === profileConfigs[activeProfileID].password) {
        fecharModal('modalProfileAuth'); executarAnimacaoNetflix();
      } else { alerta("Senha Incorreta"); }
    }

    function executarAnimacaoNetflix() {
      document.querySelectorAll('.profile').forEach(p => { p.style.pointerEvents = 'none'; if(p !== activeProfileElement) p.style.opacity = '0.3'; });
      activeProfileElement.classList.add('loading');
      setTimeout(() => {
        document.getElementById('profileScreen').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('profileScreen').style.display = 'none';
          document.getElementById('mainApp').style.display = 'flex';
          setTimeout(() => { document.getElementById('mainApp').style.opacity = '1'; }, 50);
        }, 600); 
      }, 1200); 
    }

    function verificarSenhaAdmin() {
      if(document.getElementById('adminPassInput').value === "MMC1995") {
        fecharModal('modalAdminAuth'); document.getElementById('adminPassInput').value = ""; abrirPainelSettings();
      } else { alerta("Senha Incorreta"); }
    }

    function abrirPainelSettings() {
      abrirModal('modalAdminSettings');
      let grid = document.getElementById('avatarGridList'); grid.innerHTML = "";
      availableAvatars.forEach(url => {
        let div = document.createElement('div'); div.className = "avatar-option"; div.innerHTML = `<img src="${url}">`;
        div.onclick = () => { document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected')); div.classList.add('selected'); document.getElementById('configAvatarPreview').src = url; currentSelectedAvatarUrl = url; };
        grid.appendChild(div);
      });
      carregarConfigPerfil();
    }

    function carregarConfigPerfil() {
      const id = document.getElementById('configProfileSelect').value;
      const config = profileConfigs[id];
      document.getElementById('configProfileName').value = config.name;
      document.getElementById('configProfilePass').value = config.password;
      currentSelectedAvatarUrl = config.avatar;
      document.getElementById('configAvatarPreview').src = currentSelectedAvatarUrl;
      document.querySelectorAll('.avatar-option').forEach(el => { el.classList.remove('selected'); if(el.querySelector('img').src === currentSelectedAvatarUrl) el.classList.add('selected'); });
    }

    async function salvarConfigPerfil() {
      const id = document.getElementById('configProfileSelect').value;
      const name = document.getElementById('configProfileName').value;
      const pass = document.getElementById('configProfilePass').value;
      document.getElementById('btnSaveConfig').innerHTML = "<span class='loader'></span>";
      let res = await callApi('updateProfileConfig', { id, name, avatar: currentSelectedAvatarUrl, password: pass });
      document.getElementById('btnSaveConfig').innerText = "Salvar";
      if(res === "SUCCESS") {
        profileConfigs[id] = { name, avatar: currentSelectedAvatarUrl, password: pass };
        document.getElementById('img-' + id).src = currentSelectedAvatarUrl;
        document.getElementById('name-' + id).innerText = name;
        document.getElementById('lock-' + id).style.display = pass ? "inline-block" : "none";
        fecharModal('modalAdminSettings'); msg("Configuração Salva!");
      }
    }

    // FUNÇÕES ORIGINAIS DE LOJAS E IDIOMA...
    const i18n = {
      pt: { brandTitle: "MMC | Gerador de Stylecard", langBtn: "Language", modalLangTitle: "Alterar Idioma", btnDb: "Lojas Registradas", btnAdd: "+ Adicionar Loja", btnGen: "Gerar Stylecard", btnUpdate: "Atualizar Ordem", btnDown: "Baixar TXT" },
      en: { brandTitle: "MMC | Stylecard Generator", langBtn: "Idioma", modalLangTitle: "Change Language", btnDb: "Registered Stores", btnAdd: "+ Add Store", btnGen: "Generate Stylecard", btnUpdate: "Update Order", btnDown: "Download TXT" }
    };

    let currentLang = localStorage.getItem('mmc_lang') || 'pt';
    function setLanguage(lang) {
      currentLang = lang; localStorage.setItem('mmc_lang', lang);
      document.getElementById('sysTitle').innerText = i18n[lang].brandTitle;
      document.getElementById('langBtnText').innerText = i18n[lang].langBtn;
      document.getElementById('btnDbText').innerText = i18n[lang].btnDb;
      document.getElementById('btnAddText').innerText = i18n[lang].btnAdd;
      document.getElementById('genBtn').innerText = i18n[lang].btnGen;
      document.getElementById('btnUpdateText').innerText = i18n[lang].btnUpdate;
      document.getElementById('btnDownText').innerText = i18n[lang].btnDown;
      fecharModal('modalChangeLang');
    }

    function abrirModal(id){ document.getElementById(id).style.display='flex'; }
    function fecharModal(id){ document.getElementById(id).style.display='none'; }
    function msg(m){ document.getElementById('successMsg').innerText=m; abrirModal('modalSuccess'); }
    function alerta(m){ document.getElementById('alertMsg').innerText=m; abrirModal('modalAlert'); }

    async function gerarNotecard(){ 
      const entrada = document.getElementById('inputList').value; if(!entrada.trim()) return;
      document.getElementById('genBtn').innerText = "...";
      let res = await callApi('processarLista', { textoBruto: entrada });
      if(res) document.getElementById('outputList').value = res.texto;
      document.getElementById('genBtn').innerText = i18n[currentLang].btnGen;
    }

    async function abrirModalAdd(){ 
      abrirModal('modalAdd'); 
      let lojas = await callApi('getLojas');
      if(lojas) {
        let tags = [...new Set(lojas.map(i => i.tag).filter(t => t))].sort();
        let html = '<option value="">Mista</option>';
        tags.forEach(t => html += `<option value="${t}">${t}</option>`);
        document.getElementById('tagSelect').innerHTML = html;
      }
    }
    async function salvarLoja(){
      const val = document.getElementById('fastInput').value; if(!val.trim()) return;
      document.getElementById('saveBtn').innerHTML = "<span class='loader'></span>";
      await callApi('adicionarLoja', { texto: val, tag: document.getElementById('tagSelect').value });
      document.getElementById('saveBtn').innerText = "Salvar"; fecharModal('modalAdd'); document.getElementById('fastInput').value = ''; msg("Salvo!");
    }
    async function abrirModalLojas(){
      abrirModal('modalLojas'); document.getElementById('storeGrid').innerHTML = "<span class='loader'></span>";
      let ls = await callApi('getLojas');
      if(ls) {
        let h=""; ls.forEach(i => { h += `<div class="store-card" data-name="${i.loja}"><div style="cursor:pointer; flex:1" onclick="alerta('${i.loja}')"><div>${i.loja}</div><span class="mini-tag" style="background:#7eff7e">${i.tag||'Mista'}</span></div><div style="cursor:pointer" onclick="apagarLoja('${i.loja}')">🗑️</div></div>`; });
        document.getElementById('storeGrid').innerHTML=h;
      }
    }
    function filtrarLojas() { let input = document.getElementById('searchInput').value.toUpperCase(); document.querySelectorAll('.store-card').forEach(c => c.style.display = c.getAttribute('data-name').includes(input) ? 'flex' : 'none'); }
    function verificarDownload(){ let txt = document.getElementById('outputList').value; if(!txt) return; execDownload(); }
    function execDownload(){ let blob = new Blob([document.getElementById('outputList').value], {type:'text/plain'}); let a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='STYLECARD.txt'; a.click(); }
    function reorganizar(){
      let txt = document.getElementById('outputList').value; if(!txt) return;
      let ordem = ["HEAD", "FACE SKIN", "BODY", "BODY SKIN", "FACE ADDON", "BEARD", "EYES", "LASHES", "HAIRBASE", "HAIR", "DEFORMS", "TATTOO", "BODY ADDON", "BODY HAIR", "MAKEUP", "NAILS", "SPANKER", "ACESSORIES", "CLOTHING", "?"];
      let blocos = txt.split('------------------------------------------------------------').filter(b => b.trim() !== "").map(b => {
        let m = b.match(/BUTTON NAME:\s*(.+)/);
        let btn = m ? m[1].trim() : "?";
        return { btn, texto: "------------------------------------------------------------\n" + b.trim() + "\n" };
      });
      blocos.sort((a,b) => (ordem.indexOf(a.btn)===-1?998:ordem.indexOf(a.btn)) - (ordem.indexOf(b.btn)===-1?998:ordem.indexOf(b.btn)));
      document.getElementById('outputList').value = blocos.map(b => b.texto).join("");
    }
    async function downloadDatabase(){ let ls = await callApi('getLojas'); if(ls) { let t = ls.map(i => `${i.loja} = ${i.slurl}${i.tag?' = '+i.tag:''}`).join('\n'); let b = new Blob([t], {type:'text/plain'}); let a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download='BACKUP.txt'; a.click(); } }
  </script>
</body>
